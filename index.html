<html lang="ja">
	<head>
		<title>Infinitasプレイリザルト管理 -ログイン-</title>
		<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
		<link rel="stylesheet" href="style.css">
		<script type="text/javascript" src="dom.js"></script>
		<script type="text/javascript" src="script.js"></script>
		<script type="text/javascript">
			function login(){
				const djName = document.getElementById("djName").value;
				if(djName == ""){
					alert("DJ NAMEが入力されていません。");
					return;
				}
				show("spinner");
				// Google spreadsheetデータをロードする
				fetch(gsendpoint + "?type=checkUser&id=" + djName).
				then(response => response.json()).
				then(data => {
					hide("spinner");
					// 情報あり
					if(data.result){
						window.location.href = "contents.html?id=" + djName;
					// 情報なし
					}else{
						// メッセージ表示
						alert(`"${djName}"は登録されていません。`);
					}
				});
			}
		</script>
	</head>
	<body onload="hide('spinner');">
		<!--spinner-->
		<div id="spinner">
			<section class="spinnerContainer">
				<div class="spinner"></div>
			</section>
		</div>
		<div style="text-align:center;padding-top:0.5rem;">
			<h2>Infinitasプレイリザルト管理 ログイン</h2>
		</div>
		<div style="display:flex;justify-content:center;">
			<div>
				<div>DJ NAME</div>
				<div><input type="text" id="djName"></div>
			</div>
		</div>
		<div style="margin-top:0.5rem;text-align:center;">
			<button type="button" onclick="login();">ログイン</button>
		<div>
	</body>
</html>
